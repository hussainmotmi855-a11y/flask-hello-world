<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>صانع السيرة الذاتية</title>
</head>
<body>
    <h1>أدخل بيانات سيرتك الذاتية</h1>
    
    <form action="/upload" method="POST" enctype="multipart/form-data">
        <label>الاسم الكامل:</label><br>
        <input type="text" name="full_name" required><br><br>

        <label>المسمى الوظيفي:</label><br>
        <input type="text" name="job_title" required><br><br>

        <label>ارفع سيرتك الذاتية (PDF):</label><br>
        <input type="file" name="pdf_file" accept="application/pdf" required><br><br>

        <button type="submit">إرسال ومعالجة البيانات</button>
    </form>
</body>
</html>
