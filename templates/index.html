<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منشئ السيرة الذاتية الذكي</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #f4f7f6; padding: 20px; }
        .container { max-width: 700px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { color: #2c3e50; text-align: center; }
        .upload-section { background: #e8f5e9; padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 2px dashed #4caf50; text-align: center; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; }
        input, textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; margin-top: 10px; }
        .submit-btn { background-color: #2c3e50; color: white; }
        .add-btn { background-color: #3498db; color: white; }
    </style>
</head>
<body>

<div class="container">
    <h2>منشئ السيرة الذاتية</h2>

    <div class="upload-section">
        <form action="/upload" method="POST" enctype="multipart/form-data">
            <label>ارفع سيرتك القديمة لاستخراج البيانات تلقائياً:</label>
            <input type="file" name="file" accept=".pdf">
            <button type="submit" style="background: #4caf50; color: white;">استخراج البيانات</button>
        </form>
    </div>

    <form action="/generate" method="POST">
        <div class="form-group">
            <label>الاسم الكامل:</label>
            <input type="text" name="name" value="{{ extracted_text if extracted_text else '' }}" required>
        </div>
        <div class="form-group">
            <label>البريد الإلكتروني:</label>
            <input type="email" name="email">
        </div>
        <div class="form-group">
            <label>رقم الهاتف:</label>
            <input type="tel" name="phone">
        </div>
        <div class="form-group">
            <label>المسمى الوظيفي:</label>
            <input type="text" name="job_title">
        </div>

        <div id="exp-container">
            <label>الخبرات:</label>
            <input type="text" name="experience[]" placeholder="خبرة عمل...">
        </div>
        <button type="button" class="add-btn" onclick="addItem('exp-container', 'experience[]')">+ إضافة خبرة</button>

        <div id="skill-container" style="margin-top: 15px;">
            <label>المهارات:</label>
            <input type="text" name="skills[]" placeholder="مهارة...">
        </div>
        <button type="button" class="add-btn" onclick="addItem('skill-container', 'skills[]')">+ إضافة مهارة</button>

        <button type="submit" class="submit-btn">إنشاء السيرة الذاتية الاحترافية</button>
    </form>
</div>

<script>
    function addItem(containerId, inputName) {
        const container = document.getElementById(containerId);
        const input = document.createElement('input');
        input.type = 'text';
        input.name = inputName;
        input.style.marginTop = '10px';
        container.appendChild(input);
    }
</script>

</body>
</html>
