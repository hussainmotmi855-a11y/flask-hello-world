<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; line-height: 1.6; padding: 40px; background: #f4f4f4; }
        .cv-container { max-width: 800px; margin: auto; background: white; padding: 40px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        .header { border-bottom: 2px solid #333; margin-bottom: 20px; }
        .section { margin-bottom: 20px; }
        h2 { color: #2c3e50; border-right: 5px solid #2c3e50; padding-right: 10px; }
        .skills-list { display: flex; flex-wrap: wrap; }
        .skill-item { background: #e0e0e0; padding: 5px 15px; margin: 5px; border-radius: 15px; }
    </style>
</head>
<body>
    <div class="cv-container">
        <div class="header">
            <h1>{{ data.name }}</h1>
            <p><strong>المسمى الوظيفي:</strong> {{ data.job }}</p>
        </div>
        <div class="section">
            <h2>الخبرات المهنية</h2>
            <ul>{% for exp in data.experiences %}<li>{{ exp }}</li>{% endfor %}</ul>
        </div>
        <div class="section">
            <h2>المهارات</h2>
            <div class="skills-list">
                {% for skill in data.skills %}<span class="skill-item">{{ skill }}</span>{% endfor %}
            </div>
        </div>
    </div>
</body>
</html>
