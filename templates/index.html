<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>منشئ السيرة الذاتية</title>
    <style>
        body{font-family: Arial; padding: 20px; background: #f4f4f4;}
        .container{max-width: 600px; margin: auto; background: white; padding: 20px; border-radius: 8px;}
        input, textarea{width: 100%; margin: 10px 0; padding: 10px;}
        button{padding: 10px 20px; cursor: pointer;}
    </style>
</head>
<body>
<div class="container">
    <form action="/upload" method="POST" enctype="multipart/form-data">
        <input type="file" name="file" accept=".pdf">
        <button type="submit">قراءة PDF</button>
    </form>
    <form action="/generate" method="POST">
        <input type="text" name="name" value="{{ extracted_text if extracted_text else '' }}" placeholder="الاسم">
        <input type="email" name="email" placeholder="الإيميل">
        <input type="text" name="education" placeholder="التعليم">
        <textarea name="experience[]" placeholder="الخبرات"></textarea>
        <button type="submit">إنشاء السيرة الذاتية</button>
    </form>
</div>
</body>
</html>
