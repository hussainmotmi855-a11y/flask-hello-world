<form action="/generate" method="POST">
    <input type="text" name="name" value="{{ cv_data.name if cv_data else '' }}" placeholder="الاسم">
    <input type="email" name="email" value="{{ cv_data.email if cv_data else '' }}" placeholder="البريد الإلكتروني">
    <input type="text" name="job_title" value="{{ cv_data.job_title if cv_data else '' }}" placeholder="المسمى الوظيفي">
    <textarea name="education">{{ cv_data.education if cv_data else '' }}</textarea>
    <button type="submit">إنشاء السيرة الذاتية النهائية</button>
</form>
