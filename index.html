<!DOCTYPE html>

<html dir="rtl">

<head>

<meta charset="UTF-8">

<title>خبير السيرة الذاتية الذكي</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background:#f3f4f6;
    font-family:Arial;
}

.main-box{
    max-width:1000px;
    margin:auto;
    margin-top:40px;
    background:white;
    padding:40px;
    border-radius:20px;
}

.template-box img{
    width:100%;
    border-radius:12px;
    border:3px solid transparent;
    transition:0.3s;
}

.template-box input:checked + img{
    border-color:#2563eb;
}

.title{
    text-align:center;
    margin-bottom:30px;
}

.title h1{
    color:#1d4ed8;
    font-weight:bold;
}

.generate-btn{
    width:100%;
    padding:15px;
    font-size:20px;
}

</style>

</head>

<body>

<div class="main-box">

<div class="title">

<h1>📄 خبير السيرة الذاتية الذكي</h1>

<p>
أنشئ CV احترافي متوافق مع ATS
</p>

</div>

<form method="POST">

<div class="row">

<div class="col-md-6 mb-3">
<label>الاسم الكامل</label>
<input type="text" name="name" class="form-control" required>
</div>

<div class="col-md-6 mb-3">
<label>البريد الإلكتروني</label>
<input type="email" name="email" class="form-control">
</div>

<div class="col-md-6 mb-3">
<label>رقم الهاتف</label>
<input type="text" name="phone" class="form-control">
</div>

<div class="col-md-6 mb-3">
<label>المدينة</label>
<input type="text" name="city" class="form-control">
</div>

<div class="col-md-12 mb-3">
<label>الوظيفة المستهدفة</label>
<input type="text" name="job" class="form-control">
</div>

<div class="col-md-12 mb-3">
<label>المهارات</label>
<textarea name="skills" rows="4" class="form-control"></textarea>
</div>

<div class="col-md-12 mb-3">
<label>الخبرة</label>
<textarea name="experience" rows="4" class="form-control"></textarea>
</div>

</div>

<hr>

<h3 class="mb-4">
اختر قالب السيرة الذاتية
</h3>

<div class="row">

<div class="col-md-6">

<label class="template-box">

<input type="radio" name="template" value="modern" checked hidden>

<img src="https://i.imgur.com/Jh2s8YF.png">

</label>

</div>

<div class="col-md-6">

<label class="template-box">

<input type="radio" name="template" value="simple" hidden>

<img src="https://i.imgur.com/9X12F7M.png">

</label>

</div>

</div>

<br>

<button class="btn btn-primary generate-btn">
إنشاء السيرة الذاتية
</button>

</form>

</div>

</body>

</html>
