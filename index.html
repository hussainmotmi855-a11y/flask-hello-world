<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>منصة بناء السيرة الذاتية الذكية</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #eef2f5; margin: 0; padding: 20px; }
        .card { max-width: 700px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        h1 { color: #333; text-align: center; }
        .input-group { margin-bottom: 15px; }
        input, textarea { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .btn { background: #6366f1; color: white; padding: 12px; border: none; border-radius: 8px; cursor: pointer; width: 100%; font-size: 16px; margin-top: 10px; }
        .btn:hover { background: #4f46e5; }
    </style>
</head>
<body>
<div class="card">
    <h1>مُنشئ السيرة الذاتية الذكي</h1>
    <form method="POST" enctype="multipart/form-data">
        <input type="file" name="file" accept=".pdf">
        <button type="submit" class="btn">تحليل وتعبئة البيانات بالذكاء الاصطناعي</button>
    </form>
    <hr>
    <form>
        <div class="input-group"><input type="text" name="name" value="{{ cv_data.name if cv_data else '' }}" placeholder="الاسم الكامل"></div>
        <div class="input-group"><input type="email" name="email" value="{{ cv_data.email if cv_data else '' }}" placeholder="الإيميل"></div>
        <div class="input-group"><textarea name="education" placeholder="التعليم">{{ cv_data.education if cv_data else '' }}</textarea></div>
        <button type="submit" class="btn">تعديل وحفظ</button>
    </form>
</div>
</body>
</html>
